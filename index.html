<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HELLCODE AI</title>

<style>
*{
box-sizing:border-box;
font-family:Consolas,monospace;
}

body{
margin:0;
height:100vh;
background:#020202;
color:white;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

body:before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle,rgba(255,0,0,.25),transparent 40%);
animation:rot 15s linear infinite;
z-index:-1;
}

@keyframes rot{
to{transform:rotate(360deg)}
}

.chat{
width:95%;
max-width:900px;
height:90vh;
background:#080808;
border:2px solid red;
border-radius:20px;
box-shadow:0 0 30px red;
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
height:70px;
background:#111;
border-bottom:2px solid red;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
color:red;
text-shadow:0 0 15px red;
}

.api{
position:absolute;
top:20px;
right:20px;
}

.api input,
#texto{
background:#000;
color:red;
border:1px solid red;
padding:12px;
border-radius:10px;
}

.api input{
width:170px;
}

.msgs{
flex:1;
padding:20px;
overflow:auto;
display:flex;
flex-direction:column;
gap:12px;
}

.msg{
padding:12px;
border-radius:15px;
max-width:80%;
white-space:pre-wrap;
animation:show .3s;
}

@keyframes show{
from{opacity:0;transform:translateY(15px)}
}

.ai{
background:#111;
border:1px solid red;
color:#ff6666;
align-self:flex-start;
}

.user{
background:#900;
align-self:flex-end;
}

.bottom{
display:flex;
gap:10px;
padding:15px;
background:#111;
border-top:2px solid red;
}

#texto{
flex:1;
}

button{
width:120px;
background:red;
color:white;
border:0;
border-radius:10px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="chat">

<div class="header">
☠ HELLCODE AI ☠
</div>

<div class="api">
<input id="apiKey" type="password" placeholder="API KEY">
</div>

<div class="msgs" id="msgs">
<div class="msg ai">
🔥 HELLCODE AI ONLINE

Digite sua mensagem...
</div>
</div>

<div class="bottom">
<input id="texto" placeholder="Digite aqui...">
<button onclick="enviar()">ENVIAR</button>
</div>

</div>


<script>

const msgs=document.getElementById("msgs");
const texto=document.getElementById("texto");

let historico=JSON.parse(localStorage.getItem("hellcode"))||[];

historico.forEach(m=>{
addMsg(m.text,m.type);
});


function addMsg(text,type){

let div=document.createElement("div");

div.className="msg "+type;

div.innerText=text;

msgs.appendChild(div);

msgs.scrollTop=msgs.scrollHeight;

}


async function enviar(){

let pergunta=texto.value.trim();

if(!pergunta)return;

addMsg(pergunta,"user");

texto.value="";

historico.push({
text:pergunta,
type:"user"
});

localStorage.setItem(
"hellcode",
JSON.stringify(historico)
);


let r = await fetch("COLE_A_URL_DO_SEU_WORKER_AQUI", {
    method:"POST",
    headers:{
        "Content-Type":"application/json"
    },
    body:JSON.stringify({
        message: pergunta
    })
});

let data = await r.json();

let resposta = data.reply;

addMsg(resposta,"ai");

addMsg(resposta,"ai");


historico.push({
text:resposta,
type:"ai"
});

localStorage.setItem(
"hellcode",
JSON.stringify(historico)
);

}


texto.addEventListener("keydown",e=>{
if(e.key==="Enter") enviar();
});


</script>

</body>
</html>
